<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Admin School Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>#map { height: 100vh; }</style>
  <!-- Import Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <h2>Admin: Quản lý điểm trường</h2>
  <div id="map"></div>

  <!-- Form chỉnh sửa trường học -->
  <div id="editForm" style="display:none; position:absolute; bottom:10px; left:10px;
       background:#fff; border:1px solid #ccc; padding:10px; z-index:1000;">
    <h3>Chỉnh sửa trường học</h3>
    <label>Tên trường: <input type="text" id="editTenTruong"></label><br/>
    <label>Phường/Xã: <input type="text" id="editPhuongXa"></label><br/>
    <label>Diện tích: <input type="text" id="editDienTich"></label><br/>
    <label>Tọa độ X: <input type="text" id="editLon"></label><br/>
    <label>Tọa độ Y: <input type="text" id="editLat"></label><br/>
    <label>Approve: <input type="checkbox" id="editApprove"></label><br/>
    <button id="saveEditBtn">Cập nhật</button>
    <button onclick="document.getElementById('editForm').style.display='none'">Đóng</button>
  </div>

<script>
// 1. Khởi tạo bản đồ
const map = L.map('map').setView([16.25, 107.25], 9);
const googleLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
  subdomains:['mt0','mt1','mt2','mt3'],
  maxZoom: 20
}).addTo(map);

let schoolsLayer;

// 2. Khai báo các lớp overlay Earth Engine (gọi API động)
let densityLayer, buffer1000Layer, buffer500Layer, ranhGioiXaLayer;

fetch('/api/population-map')
  .then(res => res.json())
  .then(data => {
    densityLayer = L.tileLayer(data.url, { attribution: 'Google Earth Engine', opacity: 0.5 });
    overlayMaps["Dân số"] = densityLayer;
  });

fetch('/api/buffer1000-map')
  .then(res => res.json())
  .then(data => {
    buffer1000Layer = L.tileLayer(data.url, { attribution: 'Google Earth Engine', opacity: 0.9 });
    overlayMaps["Buffer 1000m"] = buffer1000Layer;
  });

fetch('/api/buffer500-map')
  .then(res => res.json())
  .then(data => {
    buffer500Layer = L.tileLayer(data.url, { attribution: 'Google Earth Engine', opacity: 0.9 });
    overlayMaps["Buffer 500m"] = buffer500Layer;
  });

fetch('/api/ranhgioixa-map')
  .then(res => res.json())
  .then(data => {
    ranhGioiXaLayer = L.tileLayer(data.url, { attribution: 'Google Earth Engine' });
    overlayMaps["Ranh giới xã"] = ranhGioiXaLayer;
  });

// Icon trường học đã duyệt
const schoolIconApproved = L.icon({
  iconUrl: "icons/Icon-TH3.png",   // đường dẫn tới file PNG bạn đã tạo
  iconSize: [32, 48],
  iconAnchor: [16, 48],
  popupAnchor: [0, -48]
});

// Icon trường học chưa duyệt
const schoolIconPending = L.icon({
  iconUrl: "icons/Icon-TH2.png",
  iconSize: [32, 48],
  iconAnchor: [16, 48],
  popupAnchor: [0, -48]
});

// 3. Hàm load dữ liệu trường học từ bucket
const bucketUrl = "https://storage.googleapis.com/mamnon-hue-data/mamnon.geojson";
function loadSchools() {
  fetch(bucketUrl + "?ts=" + Date.now())
    .then(res => res.json())
    .then(data => {
      if (schoolsLayer) { map.removeLayer(schoolsLayer); }
      schoolsLayer = L.layerGroup();

      (data.features || []).forEach(f => {
        const coords = f.geometry.coordinates;
const x = coords[0]; // longitude
const y = coords[1]; // latitude
if (x == null || y == null || isNaN(x) || isNaN(y)) return;


        const isApproved = (f.properties.approve === true);
        const marker = L.marker([y, x], {
  icon: isApproved ? schoolIconApproved : schoolIconPending
});

        let popupHtml = `<b>${f.properties.tenDoiTuon || "Không có tên"}</b><br/>
  Phường/Xã: ${f.properties.phuongXaTT || "N/A"}<br/>
  Diện tích: ${f.properties.dienTichDa || "N/A"}<br/>
  Trạng thái: ${isApproved ? "Đã duyệt" : "Chưa duyệt"}<br/>
  <button onclick="editSchool(${f.properties.rowNumber},
    '${f.properties.tenDoiTuon}',
    '${f.properties.phuongXaTT}',
    '${f.properties.dienTichDa}',
    ${coords[0]}, ${coords[1]},
    ${isApproved})">Chỉnh sửa</button>`;
        marker.bindPopup(popupHtml);
        schoolsLayer.addLayer(marker);
      });

      schoolsLayer.addTo(map);
      overlayMaps["Điểm trường"] = schoolsLayer;
    })
    .catch(err => console.error("Lỗi fetch GeoJSON từ bucket:", err));
}

// 4. Hàm gọi API approve
function approveSchool(rowNumber) {
  fetch(`/api/approve/${rowNumber}`, { method: "POST" })
    .then(res => res.json())
    .then(result => {
      alert("Đã duyệt trường dòng " + result.row);
      loadSchools();
    })
    .catch(err => {
      console.error(err);
      alert("Lỗi khi duyệt trường");
    });
}

// 5. Khai báo baseMaps và overlayMaps
var baseMaps = { "Google Hybrid": googleLayer };
var overlayMaps = {
  "Dân số": densityLayer,
  "Buffer 1000m": buffer1000Layer,
  "Buffer 500m": buffer500Layer,
  "Ranh giới xã": ranhGioiXaLayer
  // "Điểm trường" sẽ thêm sau khi loadSchools()
};

// 6. Load ban đầu
loadSchools();

// 7. Control layer để bật/tắt lớp
L.control.layers(baseMaps, overlayMaps).addTo(map);

// 8. Hàm mở form chỉnh sửa
function editSchool(rowNumber, tenTruong, phuongXa, dienTich, lon, lat, approve) {
  document.getElementById("editForm").style.display = "block";
  document.getElementById("editTenTruong").value = tenTruong || "";
  document.getElementById("editPhuongXa").value = phuongXa || "";
  document.getElementById("editDienTich").value = dienTich || "";
  document.getElementById("editLon").value = lon || "";
  document.getElementById("editLat").value = lat || "";
  document.getElementById("editApprove").checked = approve || false;
  window.currentRowNumber = rowNumber;
}

// 9. Hàm lưu chỉnh sửa
document.getElementById("saveEditBtn").addEventListener("click", () => {
  const tenTruong = document.getElementById("editTenTruong").value;
  const phuongXa = document.getElementById("editPhuongXa").value;
  const dienTich = document.getElementById("editDienTich").value;
  const lon = parseFloat(document.getElementById("editLon").value);
  const lat = parseFloat(document.getElementById("editLat").value);
  const approve = document.getElementById("editApprove").checked;

  fetch(`/api/update/${window.currentRowNumber}`, {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ tenTruong, phuongXa, dienTich, lon, lat, approve })
})
  .then(res => res.json())
  .then(result => {
    alert("Đã cập nhật trường: " + result.message);
    document.getElementById("editForm").style.display = "none";
    loadSchools();
  })
  .catch(err => {
    console.error(err);
    alert("Lỗi khi cập nhật trường");
  });
});
</script>
</body>
</html>
