<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Guest School Map</title>
  <!-- ==========================
       1. CSS & Style
  ========================== -->
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
<script src="vendor/leaflet/leaflet.js"></script>
  <style>
    #map { height: 500px; }
    #popupForm {
      display: none;
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: #fff;
      border: 1px solid #ccc;
      padding: 10px;
      z-index: 1000;
      font-size: 14px;
    }
    .form-row { display: flex; margin-bottom: 6px; }
    .form-row label { width: 90px; }
    .form-row input { flex: 1; padding: 4px; }
    .coords-row { display: flex; margin-bottom: 6px; }
    .coords-inputs { flex: 1; }
    .coord { display: flex; margin-bottom: 4px; }
    .coord label { width: 90px; }
    .coord input { flex: 1; padding: 4px; }
    #openFormBtn { margin-bottom: 10px; }
  </style>
</head>
<body>
  <!-- ==========================
       2. UI Layout
  ========================== -->
  <h2>Guest: Bản đồ điểm trường</h2>
  <button id="openFormBtn">BỔ SUNG TRƯỜNG</button>
  <div id="map"></div>

  <!-- Form nhập liệu -->
  <div id="popupForm">
    <div class="form-row">
      <label>TÊN TRƯỜNG:</label>
      <input type="text" id="tentruong">
    </div>
    <div class="form-row">
      <label>PHƯỜNG/XÃ:</label>
      <input type="text" id="phuongXaTT">
    </div>
    <div class="form-row">
      <label>DIỆN TÍCH:</label>
      <input type="text" id="dientich">
    </div>
    <div class="coords-row">
      <div class="coords-inputs">
        <div class="coord">
          <label>TỌA ĐỘ X:</label>
          <input type="text" id="lon">
        </div>
        <div class="coord">
          <label>TỌA ĐỘ Y:</label>
          <input type="text" id="lat">
        </div>
      </div>
      <button type="button" id="pickLonLatBtn">CHỌN TRÊN<br>BẢN ĐỒ</button>
    </div>
    <button id="submitBtn">THÊM</button>
  </div>

  <!-- ==========================
       3. Scripts & Map Logic
  ========================== -->
    <script>
    // 3a. Khởi tạo bản đồ
    const map = L.map('map').setView([16.25, 107.25], 10);
    const googleLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
      subdomains:['mt0','mt1','mt2','mt3'],
      maxZoom: 20
    }).addTo(map);

    // 3b. Hiển thị form
    document.getElementById("openFormBtn").addEventListener("click", () => {
      document.getElementById("popupForm").style.display = "block";
    });

    // 3c. Chọn tọa độ trên bản đồ (chỉ khi bấm nút)
    let tempMarker;
    let isPickingCoords = false;

    document.getElementById("pickLonLatBtn").addEventListener("click", () => {
      isPickingCoords = true;
      alert("Hãy click vào bản đồ để chọn tọa độ");
    });

    map.on("click", (e) => {
      if (!isPickingCoords) return;
      const { lat, lng } = e.latlng;
      document.getElementById("lat").value = lat;
      document.getElementById("lon").value = lng;

      if (tempMarker) map.removeLayer(tempMarker);
      tempMarker = L.marker([lat, lng]).addTo(map);

      isPickingCoords = false;
    });

    // 3d. Gửi dữ liệu lên server
    document.getElementById("submitBtn").addEventListener("click", () => {
      const tentruong = document.getElementById("tentruong").value;
      const phuongXaTT = document.getElementById("phuongXaTT").value;
      const dientich = document.getElementById("dientich").value;
      const lon = parseFloat(document.getElementById("lon").value);
      const lat = parseFloat(document.getElementById("lat").value);

      fetch("/api/schools/add", {   // dùng relative path để chạy cả local & Render
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tentruong, phuongXaTT, dientich, lon, lat })
      })
      .then(res => res.json())
      .then(result => {
        alert(result.message || "Đã gửi dữ liệu");
        L.marker([lat, lon], { icon: schoolIconPending })
          .addTo(map)
          .bindPopup(`<b>${tentruong}</b><br/>Diện tích: ${dientich}<br/>Phường/Xã: ${phuongXaTT}<br/>Approve: false`);
      });
    });

    // 3e. Icon trạng thái trường
    const schoolIconApproved = L.icon({
      iconUrl: "icons/Icon-TH3.png",
      iconSize: [32, 48],
      iconAnchor: [16, 48],
      popupAnchor: [0, -48]
    });
    const schoolIconPending = L.icon({
      iconUrl: "icons/Icon-TH2.png",
      iconSize: [32, 48],
      iconAnchor: [16, 48],
      popupAnchor: [0, -48]
    });

    // 3f. Load dữ liệu GeoJSON từ bucket
    const bucketUrl = "https://storage.googleapis.com/mamnon-hue-data/mamnon.geojson";
    fetch(bucketUrl + "?ts=" + Date.now())
      .then(res => res.json())
      .then(data => {
        const schoolsLayer = L.layerGroup();

        (data.features || []).forEach(f => {
          const coords = f.geometry.coordinates;
let x = coords[0]; // longitude
let y = coords[1]; // latitude
if (x == null || y == null || isNaN(x) || isNaN(y)) return;

          const isApproved = (f.properties.approve === true);
          const tinhTrang = isApproved ? "Đã cập nhật" : "Đang đề xuất";

          const marker = L.marker([y, x], {
            icon: isApproved ? schoolIconApproved : schoolIconPending
          }).bindPopup(
            `<b>${f.properties.tenDoiTuon || "Không có tên"}</b><br/>
             Diện tích: ${f.properties.dienTichDa || "N/A"}<br/>
             Phường/Xã: ${f.properties.phuongXaTT || "N/A"}<br/>
             Tình trạng: ${tinhTrang}`
          );

          schoolsLayer.addLayer(marker);
        });

        schoolsLayer.addTo(map);

        // 3g. Các lớp overlay Earth Engine
        let densityLayer, buffer1000Layer, buffer500Layer, ranhGioiXaLayer;

fetch('/api/population-map')
  .then(res => res.json())
  .then(data => {
    densityLayer = L.tileLayer(data.url, { attribution: 'Google Earth Engine', opacity: 0.4 });
    overlayMaps["Dân số"] = densityLayer;
  });

fetch('/api/buffer1000-map')
  .then(res => res.json())
  .then(data => {
    buffer1000Layer = L.tileLayer(data.url, { attribution: 'Google Earth Engine' });
    overlayMaps["Buffer 1000m"] = buffer1000Layer;
  });

fetch('/api/buffer500-map')
  .then(res => res.json())
  .then(data => {
    buffer500Layer = L.tileLayer(data.url, { attribution: 'Google Earth Engine' });
    overlayMaps["Buffer 500m"] = buffer500Layer;
  });

fetch('/api/ranhgioixa-map')
  .then(res => res.json())
  .then(data => {
    ranhGioiXaLayer = L.tileLayer(data.url, { attribution: 'Google Earth Engine' });
    overlayMaps["Ranh giới xã"] = ranhGioiXaLayer;
  });

var baseMaps = { "Google Hybrid": googleLayer };
var overlayMaps = {
  "Dân số": densityLayer,
  "Buffer 1000m": buffer1000Layer,
  "Buffer 500m": buffer500Layer,
  "Ranh giới xã": ranhGioiXaLayer,
  "Điểm trường": schoolsLayer
};

L.control.layers(baseMaps, overlayMaps).addTo(map);
      })
      .catch(err => console.error("Lỗi fetch GeoJSON từ bucket:", err));
  </script>
</body>
</html>
